services:
  - type: web
    name: pm-ai-tool
    env: node
    plan: free
    buildCommand: rm -f package-lock.json apps/web/package-lock.json server/package-lock.json && NODE_ENV=development npm install && npm run build && cd server && npx prisma generate
    startCommand: cd server && NODE_ENV=production npm start
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: DATABASE_URL
        fromDatabase:
          name: pm-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://pm-ai-tool.onrender.com
      - key: NODE_OPTIONS
        value: --max-old-space-size=400

databases:
  - name: pm-ai-db
    databaseName: pm_ai
    user: pm
    plan: free
