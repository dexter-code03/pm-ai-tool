replicaCount: 2

image:
  repository: pm-ai-tool
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: false
  className: ""
  hosts: []
  tls: []

env:
  NODE_ENV: production
  PORT: "3001"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi
